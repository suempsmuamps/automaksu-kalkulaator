<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050505;--card:#0f0f0f;--label:#f0f0f0;--label2:#a8a8a8;--label3:#737373;
  --sep:rgba(255,255,255,.07);--tint:#fff;--radius:18px;
  --card-border:1px solid rgba(255,255,255,.06);
  --font:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --glow:0 0 0 transparent;
  --ease:cubic-bezier(.4,0,.2,1);
}
:root[data-theme="light"]{
  --bg:#fafafa;--card:#fff;--label:#111;--label2:#4a4a4a;--label3:#636363;
  --sep:rgba(0,0,0,.06);--tint:#111;--card-border:1px solid rgba(0,0,0,.08);
  --glow:0 1px 3px rgba(0,0,0,.04);
}
@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#fafafa;--card:#fff;--label:#111;--label2:#4a4a4a;--label3:#636363;
    --sep:rgba(0,0,0,.06);--tint:#111;--card-border:1px solid rgba(0,0,0,.08);
    --glow:0 1px 3px rgba(0,0,0,.04);
  }
}
body{background:var(--bg);font-family:var(--font);color:var(--label);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.page{max-width:980px;margin:0 auto;padding:28px 20px 32px;overflow:visible}

/* ── Main 2-col grid ── */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;margin-bottom:48px}
.main-grid .form-card{margin-bottom:0}
.main-grid .bento{margin-bottom:0}
@media(max-width:700px){.main-grid{grid-template-columns:1fr;gap:12px}}

/* ── Header ── */
.header{margin-bottom:40px}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.header-title-group{display:flex;align-items:center;gap:12px}
.header-icon{font-size:2rem;line-height:1}
.header-icon svg,.info-icon svg{display:block}
.header-icon svg{width:2rem;height:2rem}
.info-icon svg{width:1.5rem;height:1.5rem}
.theme-btn svg{width:1.15rem;height:1.15rem;color:var(--label)}
.preset-btn svg,.drink-icon svg{width:1.15em;height:1.15em;flex-shrink:0}
.chip svg{width:.9em;height:.9em;flex-shrink:0}
.seg-btn svg{width:1em;height:1em;vertical-align:-.12em}
.header-title{font-size:1.75rem;font-weight:700;letter-spacing:-.5px}
.header-sub{font-size:.82rem;color:var(--label3);margin-top:3px;letter-spacing:.01em}

/* ── Lang switcher ── */
.header-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-switcher{display:flex;background:var(--sep);border-radius:10px;padding:3px;gap:2px}
.lang-btn{background:none;border:2px solid transparent;padding:5px 10px;border-radius:8px;font-size:.76rem;font-weight:600;color:var(--label3);cursor:pointer;font-family:var(--font);transition:all .2s var(--ease);letter-spacing:.02em}
.lang-btn:hover{opacity:.85}
.lang-btn.active{background:var(--card);color:var(--tint);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.theme-btn{background:var(--sep);border:2px solid transparent;width:34px;height:34px;border-radius:10px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s var(--ease);-webkit-tap-highlight-color:transparent}
.theme-btn:hover{transform:scale(1.08)}
.theme-btn:active{transform:scale(.95)}

/* ── Form card ── */
.form-card{background:var(--card);border:var(--card-border);border-radius:var(--radius);padding:22px;margin-bottom:24px;display:flex;flex-direction:column;gap:22px;box-shadow:var(--glow);transition:box-shadow .3s var(--ease)}

/* ── Segmented control ── */
.seg-group{display:flex;flex-direction:column;gap:8px}
.seg-label{font-size:.78rem;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.5px}
.seg-ctrl{display:flex;position:relative;background:var(--bg);border-radius:10px;padding:2px;gap:0}
.seg-slider{position:absolute;top:2px;left:2px;width:calc(50% - 2px);height:calc(100% - 4px);background:var(--label);border-radius:8px;transition:transform .25s var(--ease);pointer-events:none;z-index:0}
.seg-ctrl.female .seg-slider{transform:translateX(100%)}
.seg-btn{flex:1;background:none;border:none;padding:9px 12px;border-radius:8px;font-size:.95rem;font-weight:500;color:var(--label2);cursor:pointer;font-family:var(--font);transition:color .18s;position:relative;z-index:1}
.seg-btn.active{color:var(--bg);font-weight:600}
.seg-btn:hover{opacity:.85}
.seg-btn:focus-visible{outline:2px solid var(--label3);outline-offset:-2px;border-radius:8px}

/* ── Input row ── */
.grow{display:flex;flex-direction:column;gap:8px;transition:opacity .25s var(--ease)}
.grow>label{font-size:.88rem;color:var(--label2);display:flex;align-items:center;gap:7px;font-weight:500;letter-spacing:.01em}
.input-wrap{display:flex;align-items:center;background:var(--bg);border-radius:12px;overflow:hidden;border:1px solid var(--sep);transition:border-color .25s var(--ease),box-shadow .25s var(--ease)}
.input-wrap:focus-within{border-color:var(--label3);box-shadow:0 0 0 3px rgba(128,128,128,.08)}
.input-wrap input{flex:1;border:none;background:none;padding:11px 14px;font-size:1rem;font-family:var(--font);color:var(--label);outline:none;min-width:0;letter-spacing:-.01em}
.input-wrap input::placeholder{color:var(--label3);opacity:.7}
.unit{padding:11px 14px 11px 0;font-size:.82rem;color:var(--label3);white-space:nowrap;font-weight:500}

/* ── Req dot ── */
.req-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;background:var(--sep);transition:all .3s var(--ease);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:transparent;line-height:1}
.req-dot::after{content:'✓'}
.req-dot.ok{background:#22c55e;color:#fff;box-shadow:0 0 8px rgba(34,197,94,.3)}

/* ── Drinks section ── */
.drinks-section{display:flex;flex-direction:column;gap:10px}
.drinks-header{display:flex;align-items:center;gap:7px;font-size:.93rem;color:var(--label2);font-weight:500}
.drink-presets{display:flex;flex-wrap:wrap;gap:7px}
.preset-btn:hover{opacity:.85}
.preset-btn{display:flex;align-items:center;gap:5px;background:var(--bg);border:2px solid transparent;border-radius:20px;padding:7px 13px;font-size:.85rem;font-weight:500;color:var(--label);cursor:pointer;font-family:var(--font);transition:.15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.preset-btn:active{transform:scale(.95);opacity:.8}
.drinks-list{display:flex;flex-direction:column;gap:6px}
.drink-card{display:flex;flex-direction:column;gap:6px;background:var(--bg);border-radius:10px;padding:8px 10px}
.drink-top{display:flex;align-items:center;gap:7px}
.drink-fields{display:flex;align-items:center;gap:7px}
.drink-icon{font-size:1.1rem;flex-shrink:0}
.drink-name{flex:1;font-size:.83rem;font-weight:500;color:var(--label);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drink-inp{width:56px;border:none;background:var(--card);border-radius:6px;padding:4px 6px;font-size:.83rem;font-family:var(--font);color:var(--label);text-align:center;outline:none;-moz-appearance:textfield}
.drink-inp::-webkit-inner-spin-button,.drink-inp::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.drink-qty::-webkit-inner-spin-button,.drink-qty::-webkit-outer-spin-button{-webkit-appearance:auto}
.drink-qty{-moz-appearance:auto}
.drink-qty{width:36px;font-weight:600}
@media(max-width:480px){.drink-inp{width:46px;padding:4px 3px}.drink-qty{width:30px}}
.drink-unit{font-size:.75rem;color:var(--label3);white-space:nowrap}
.drink-grams{font-size:.75rem;color:var(--label2);white-space:nowrap;min-width:36px;text-align:right}
.drink-rm{background:none;border:none;color:var(--label3);cursor:pointer;font-size:1.1rem;padding:2px 4px;line-height:1;transition:color .15s;-webkit-tap-highlight-color:transparent}
.drink-rm:hover{color:#ff3b30}

/* ── Bento ── */
.bento{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:24px}

.c-ann{
  background:linear-gradient(135deg,#0a1a0a 0%,#0d2818 40%,#0a3520 100%);
  border-radius:var(--radius);padding:24px;min-height:160px;
  display:flex;flex-direction:column;justify-content:flex-end;
  transition:background .35s;position:relative;overflow:hidden;
}
.c-ann::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:20px 20px;-webkit-mask-image:radial-gradient(ellipse at 70% 30%,#000 10%,transparent 60%);mask-image:radial-gradient(ellipse at 70% 30%,#000 10%,transparent 60%);pointer-events:none}
.c-ann.st-warn{background:linear-gradient(135deg,#1a1200 0%,#332200 40%,#4a3000 100%)}
.c-ann.st-danger{background:linear-gradient(135deg,#1a0000 0%,#3d0a0a 40%,#4a0f0f 100%)}
.ann-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{background:rgba(255,255,255,.08);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:rgba(255,255,255,.85);padding:5px 12px;border-radius:20px;font-size:.76rem;font-weight:500;display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.06);transition:background .2s}
.chip-green{background:rgba(34,197,94,.2);color:#22c55e}
.chip-orange{background:rgba(245,158,11,.2);color:#f59e0b}
.chip-red{background:rgba(239,68,68,.2);color:#ef4444}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ann-num:not(.e){animation:fadeSlideIn .35s var(--ease)}
.chip{animation:fadeSlideIn .3s var(--ease) both}.chip:nth-child(2){animation-delay:.06s}.chip:nth-child(3){animation-delay:.12s}.chip:nth-child(4){animation-delay:.18s}
.c-tml{animation:fadeSlideIn .4s var(--ease)}
.tml-table tr{animation:fadeSlideIn .3s var(--ease) both}.tml-table tr:nth-child(2){animation-delay:.04s}.tml-table tr:nth-child(3){animation-delay:.08s}.tml-table tr:nth-child(4){animation-delay:.12s}.tml-table tr:nth-child(5){animation-delay:.16s}
.preset-btn:active{transform:scale(.95);transition:transform .1s}
.ann-num{font-size:3.2rem;font-weight:700;color:#fff;letter-spacing:-1.5px;line-height:1}
.ann-num.e{color:rgba(255,255,255,.35)}
.ann-lbl{font-size:.78rem;color:rgba(255,255,255,.65);margin-top:6px;text-transform:uppercase;letter-spacing:.08em;font-weight:500}

/* ── Timeline ── */
.c-tml{background:var(--card);border:var(--card-border);border-radius:var(--radius);padding:20px}
.tml-sub{font-size:.75rem;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.tml-table{width:100%;border-collapse:separate;border-spacing:0 4px}
.tml-table th{font-size:.75rem;font-weight:600;color:var(--label3);text-align:left;padding:0 12px 8px;text-transform:uppercase;letter-spacing:.06em}
.tml-table th:last-child{text-align:right}
.tml-table td{font-size:.95rem;padding:12px;background:var(--bg);font-weight:500}
.tml-table td:first-child{border-radius:10px 0 0 10px;font-weight:600}
.tml-table td:last-child{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;border-radius:0 10px 10px 0}
.tml-now td{font-weight:700}
.bar-wrap{display:flex;align-items:center}
.bar{height:8px;border-radius:4px;min-width:3px}
.bar.safe{background:#22c55e}
.bar.warn{background:#f59e0b}
.bar.danger{background:#ef4444}

/* ── Section cards ── */
.section-card{background:var(--card);border:var(--card-border);border-radius:var(--radius);padding:24px;margin-bottom:44px;box-shadow:var(--glow)}
.section-full{background-color:var(--card);border:none;border-radius:0;box-shadow:none;width:100vw;margin-left:calc(-50vw + 50%);padding:48px calc(50vw - 50% + 20px);margin-bottom:44px;position:relative;overflow:hidden}
.section-full::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:40px 40px;-webkit-mask-image:linear-gradient(to left,#000 0%,transparent 60%);mask-image:linear-gradient(to left,#000 0%,transparent 60%);pointer-events:none}
.section-full>.section-title,.section-full>.how-steps,.section-full>.sources-list,.section-full>.calc-content{max-width:940px;margin-left:auto;margin-right:auto;position:relative}
@media(max-width:1032px){.section-full{padding-left:20px;padding-right:20px}}
.section-bare{background:none;border:none;padding-left:0;padding-right:0;display:flex;align-items:flex-start;gap:32px;box-shadow:none}
.section-bare .section-title{flex-shrink:0;max-width:160px;margin-bottom:0;line-height:1.15;font-size:1.35rem;letter-spacing:-.3px;font-weight:700}
@media(max-width:700px){.section-bare{flex-direction:column;gap:20px}.section-bare .section-title{max-width:none}}
.section-bare-bg{background:var(--card);border:none;border-radius:0;width:100vw;margin-left:calc(-50vw + 50%);padding:44px calc(50vw - 50% + 20px);box-shadow:none;position:relative;overflow:hidden;gap:32px}
@media(max-width:700px){.section-bare-bg{padding:28px 20px}}
:root[data-theme="light"] .section-full::before{background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px)}
@media(prefers-color-scheme:light){:root:not([data-theme="dark"]) .section-full::before{background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px)}}
.section-title{font-size:1.35rem;font-weight:700;letter-spacing:-.3px;margin-bottom:16px}

/* ── How steps ── */
.how-steps{list-style:none;display:flex;gap:0;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;-ms-overflow-style:none;position:relative}
.how-steps::-webkit-scrollbar{display:none}
.how-steps li{flex:1;min-width:150px;display:flex;flex-direction:column;align-items:flex-start;text-align:left;gap:8px;font-size:.8rem;line-height:1.55;color:var(--label3);padding:0 20px 0 0;position:relative}
.how-steps li:not(:last-child)::after{content:'';position:absolute;top:10px;left:22px;width:calc(100% - 22px);height:1px;background:var(--sep);transition:background .3s var(--ease)}
.how-steps li.step-done:not(:last-child)::after{background:#22c55e}
.step-badge{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--label2);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:600;position:relative;z-index:1;transition:background .3s var(--ease),box-shadow .3s var(--ease)}
.step-badge.ok{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.3)}
@media(max-width:700px){.how-steps{flex-direction:column;gap:0;overflow-x:visible;padding-bottom:0}.how-steps li{min-width:0;flex-direction:row;align-items:center;gap:12px;padding:10px 0}.how-steps li:not(:last-child)::after{top:auto;left:10px;width:1px;height:calc(100% - 22px);top:26px}}

/* ── Calc content ── */
.calc-content h3{font-size:1.05rem;font-weight:700;margin:14px 0 6px}
.calc-content h3:first-child{margin-top:0}
.calc-content p{font-size:.9rem;line-height:1.65;color:var(--label2);margin-bottom:8px}
.calc-content ul{padding-left:18px;margin-bottom:8px}
.calc-content li{font-size:.9rem;line-height:1.65;color:var(--label2);margin-bottom:2px}
.calc-content code{background:var(--bg);border-radius:4px;padding:1px 5px;font-size:.85rem;font-family:'SF Mono',monospace}
.calc-content strong{color:var(--label)}

/* ── FAQ ── */
.faq-item{border-top:1px solid var(--sep)}
.faq-item:first-child{border-top:none}
.faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 0;background:transparent;border:none;cursor:pointer;font-family:var(--font);font-size:.91rem;font-weight:600;color:var(--label);text-align:left;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.faq-q:hover{opacity:.85}
.faq-toggle{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--sep);color:var(--label2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:600;line-height:1;transition:all .25s var(--ease)}
.faq-toggle svg{width:14px;height:14px}
.faq-item.open .faq-toggle{background:var(--label);color:var(--bg);transform:rotate(45deg)}
.faq-a{display:none;padding:0 0 14px;font-size:.88rem;line-height:1.65;color:var(--label2)}
.faq-a p{margin-bottom:6px}
.faq-item.open .faq-a{display:block}

/* ── Sources ── */
.sources-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.sources-list a{color:var(--label2);text-decoration:none;font-size:.86rem;display:inline-flex;align-items:center;gap:6px;transition:color .2s}
.sources-list a::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--label3);flex-shrink:0}
.sources-list a:hover{opacity:.85;text-decoration:underline;text-underline-offset:3px}

/* ── Info grid ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:44px}
@media(max-width:480px){.info-grid{grid-template-columns:1fr}}
.info-card{border-radius:var(--radius);padding:22px;transition:transform .2s var(--ease)}
.info-card:hover{opacity:.85}
.info-card--amber{background:linear-gradient(145deg,#2d2200 0%,#3d3000 50%,#231a00 100%);border:1px solid rgba(251,191,36,.12)}
.info-card--blue{background:linear-gradient(145deg,#0c1a35 0%,#132647 50%,#0c1a35 100%);border:1px solid rgba(100,160,255,.1)}
:root[data-theme="light"] .info-card--amber{background:linear-gradient(145deg,#fffbeb 0%,#fef3c7 100%);border:1px solid rgba(251,191,36,.15)}
:root[data-theme="light"] .info-card--blue{background:linear-gradient(145deg,#eff6ff 0%,#dbeafe 100%);border:1px solid rgba(100,160,255,.12)}
:root[data-theme="light"] .info-card-title{color:#111}
:root[data-theme="light"] .info-card p{color:#3d4654}
@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]) .info-card--amber{background:linear-gradient(145deg,#fffbeb 0%,#fef3c7 100%);border:1px solid rgba(251,191,36,.15)}
  :root:not([data-theme="dark"]) .info-card--blue{background:linear-gradient(145deg,#eff6ff 0%,#dbeafe 100%);border:1px solid rgba(100,160,255,.12)}
  :root:not([data-theme="dark"]) .info-card-title{color:#111}
  :root:not([data-theme="dark"]) .info-card p{color:#3d4654}
}
.info-icon{font-size:1.5rem;margin-bottom:10px}
.info-card-title{font-size:1.02rem;font-weight:700;color:var(--label);margin-bottom:6px}
.info-card p{font-size:.82rem;line-height:1.6;color:var(--label2)}
.contact-btn{display:inline-block;margin-top:12px;background:#fff;color:#000;border-radius:10px;padding:8px 16px;font-size:.82rem;font-weight:600;text-decoration:none;transition:transform .15s var(--ease),box-shadow .15s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.contact-btn:hover{opacity:.85}
.contact-btn:active{transform:translateY(0)}

.footer{text-align:center;font-size:.75rem;color:var(--label3);padding:0;letter-spacing:.01em}
</style>

function getLangFromPath() {
  const m = window.location.pathname.match(/\/(sv|en|ru|et)(\/|$)/);

}
function setLang(l, pushState){
  lang = l;
  ['FI','SV','EN','RU','ET'].forEach(x=>document.getElementById('btn'+x).classList.toggle('active',x.toLowerCase()===l));

    const base = window.location.pathname.replace(/\/(sv|en|ru|et)(\/|$)/, '/');
    const newPath = l === 'fi' ? base : base.replace(/\/$/, '') + '/' + l + '/';
    history.pushState(null, '', newPath);
  }
  applyLang(); renderPresets(); renderDrinks(); calc();
}

function addPreset(pid){

  if(!p) return;
  drinks.push({uid:++uid, icon:p.icon, name:p.name[lang]||p.name.fi, ml:p.ml, abv:p.abv, qty:1});
  renderDrinks(); calc();
}
function addCustom(){
  drinks.push({uid:++uid, icon:ICO.plus, name:t().addCustom.replace(/^\+\s*/,''), ml:100, abv:5.0, qty:1});
  renderDrinks(); calc();
}
function removeDrink(id){
  drinks = drinks.filter(d=>d.uid!==id);
  renderDrinks(); calc();
}
function updateDrink(id, field, val){
  const d = drinks.find(x=>x.uid===id);
  if(d){ d[field]=field==='qty'?Math.max(1,parseInt(val)||1):parseFloat(val)||0; refreshGrams(d); }
  calc();
}
function grams(d){ return (d.qty||1)*d.ml*(d.abv/100)*0.789; }
function refreshGrams(d){
  const el=document.getElementById('g-'+d.uid);
  if(el) el.textContent=grams(d).toFixed(1)+'g';
}

  const list = document.getElementById('drinksList');

// ── BAC ────────────────────────────────────────────────────────────────────────
function calcBAC(w, g, ds, h){
  const r=g==='m'?0.70:0.60, beta=0.15;
  const totalG = ds.reduce((s,d)=>s+grams(d),0);
  if(totalG<=0||w<=0) return {bac:0,totalG:0};
  const raw = totalG/(w*r);
  return {bac:Math.max(0,raw-beta*h), raw, totalG, r};
}

function fmtTime(h){
  if(h<=0) return '0 min';
  const hrs=Math.floor(h), mins=Math.round((h-hrs)*60);
  if(hrs===0) return mins+'min';
  if(mins===0) return hrs+'h';
  return hrs+'h '+mins+'min';
}
function fmtBac(v){ return v.toFixed(2).replace('.',','); }
var _prevBac=0;
function animateNum(el,from,to,fmt,ms){
  if(from===to){el.textContent=fmt(to);return;}
  var start=null,d=to-from;
  function step(ts){
    if(!start)start=ts;
    var p=Math.min((ts-start)/ms,1);
    p=1-Math.pow(1-p,3);
    el.textContent=fmt(from+d*p);
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Dots ───────────────────────────────────────────────────────────────────────
function updateDots(){
  const w=parseFloat(document.getElementById('iWeight').value)||0;
  const h=document.getElementById('iHours').value;
  const set=(id,ok)=>{const el=document.getElementById(id);if(el)el.classList.toggle('ok',ok);};
  const s1=w>=30&&w<=250, s2=drinks.length>0, s3=h!==''&&parseFloat(h)>=0;
  set('dotWeight', s1);
  set('dotDrinks', s2);
  set('dotHours',  s3);
  set('stepBadge0', s1);
  set('stepBadge1', s2);
  set('stepBadge2', s3);
  set('stepBadge3', s1&&s2&&s3);
  // Green connecting lines — flow like water, only green if all previous are done
  const steps = document.querySelectorAll('.how-steps li');
  const flow = [s1, s1&&s2, s1&&s2&&s3, s1&&s2&&s3];
  steps.forEach((li,i) => li.classList.toggle('step-done', !!flow[i]));
}

function clearResult(){
  const el=document.getElementById('annNum');
  el.textContent='—'; el.classList.add('e'); _prevBac=0;
  document.getElementById('annChips').innerHTML='';
  document.getElementById('annCell').className='c-ann';
  document.getElementById('tmlCard').style.display='none';
  updateDots();
  stateToURL();
}

// ── Calc ───────────────────────────────────────────────────────────────────────
function calc(){
  const tr = t();
  const w  = parseFloat(document.getElementById('iWeight').value)||0;
  const h  = parseFloat(document.getElementById('iHours').value)||0;
  updateDots();
  if(w<30||drinks.length===0){ clearResult(); return; }

  const {bac, totalG} = calcBAC(w, gender, drinks, h);
  const beta = 0.15;

  // Ann number
  const numEl = document.getElementById('annNum');
  animateNum(numEl,_prevBac,bac,fmtBac,400);_prevBac=bac;
  numEl.classList.remove('e');

  // Ann cell color
  const cell = document.getElementById('annCell');
  cell.className = 'c-ann' + (bac>=1.2?' st-danger': bac>=0.5?' st-warn':'');

  // Chips
  const chips=[];
  if(bac<0.5){
    chips.push(`<span class="chip chip-green">${ICO.check} ${tr.chipSober}</span>`);
  } else if(bac<1.2){
    chips.push(`<span class="chip chip-orange">${ICO.alert} ${tr.chipWarn}</span>`);
    chips.push(`<span class="chip chip-orange">${ICO.car} ${tr.chipDriveIn}: ${fmtTime(bac/beta)}</span>`);
  } else {
    chips.push(`<span class="chip chip-red">${ICO.ban} ${tr.chipDanger}</span>`);
    chips.push(`<span class="chip chip-orange">${ICO.car} ${tr.chipDriveIn}: ${fmtTime(bac/beta)}</span>`);
  }
  if(bac>0){
    chips.push(`<span class="chip">${ICO.clock} ${tr.chipSoberIn}: ${fmtTime(bac/beta)}</span>`);
  }
  chips.push(`<span class="chip">${totalG.toFixed(1)}g EtOH</span>`);
  document.getElementById('annChips').innerHTML = chips.join('');

  // Timeline
  renderTimeline(bac, beta, tr);
  stateToURL();
}

function renderTimeline(bac, beta, tr){
  const card = document.getElementById('tmlCard');
  card.style.display = 'block';
  document.getElementById('tlSub').textContent = tr.tlSub;

  const maxH = Math.min(Math.ceil(bac/beta)+1, 14);
  const rows = [{label:tr.tlNow, bac, now:true}];
  for(let i=1;i<=maxH;i++){
    const fb = Math.max(0,bac-beta*i);
    rows.push({label:'+'+i+'h', bac:fb});
    if(fb===0) break;
  }

  document.getElementById('tlContainer').innerHTML = `
    <table class="tml-table">
      <thead><tr><th>${tr.tlTime}</th><th></th><th>${tr.tlBAC}</th></tr></thead>
      <tbody>${rows.map(r=>{
        const lvl = r.bac>=1.2?'danger':r.bac>=0.5?'warn':'safe';
        const w   = bac>0?Math.round((r.bac/bac)*100):0;
        const val = r.bac===0?`<span style="color:#34c759">${tr.tlSober}</span>`:fmtBac(r.bac)+' ‰';
        return `<tr class="${r.now?'tml-now':''}">
          <td>${r.label}</td>
          <td><div class="bar-wrap"><div class="bar ${lvl}" style="width:${w}px"></div></div></td>
          <td>${val}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

// ── URL State ─────────────────────────────────────────────────────────────────
function stateToURL(){
  const p = new URLSearchParams();
  if(gender!=='m') p.set('g',gender);
  const w=document.getElementById('iWeight').value; if(w) p.set('w',w);
  const h=document.getElementById('iHours').value;  if(h) p.set('h',h);
  if(drinks.length){
    p.set('d', drinks.map(d=>{
      const preset=PRESETS.find(x=>x.ml===d.ml&&x.abv===d.abv&&x.icon===d.icon);
      if(preset) return (d.qty||1)>1 ? preset.id+':'+(d.qty||1) : preset.id;
      return 'c:'+(d.qty||1)+':'+d.ml+':'+d.abv;
    }).join(','));
  }
  const qs=p.toString();
  const base=window.location.pathname;
  history.replaceState(null,'',qs?base+'?'+qs:base);
}
function loadFromURL(){
  const p=new URLSearchParams(window.location.search);
  if(p.has('g')){ gender=p.get('g'); setGender(gender); }
  if(p.has('w')) document.getElementById('iWeight').value=p.get('w');
  if(p.has('h')) document.getElementById('iHours').value=p.get('h');
  if(p.has('d')){
    p.get('d').split(',').forEach(s=>{
      const parts=s.split(':');
      if(parts[0]==='c'){
        drinks.push({uid:++uid,icon:ICO.bottle,name:t().addCustom.replace(/^\+\s*/,''),qty:parseInt(parts[1])||1,ml:parseFloat(parts[2])||100,abv:parseFloat(parts[3])||5});
      } else {
        const preset=PRESETS.find(x=>x.id===parts[0]);
        if(preset) drinks.push({uid:++uid,icon:preset.icon,name:preset.name[lang]||preset.name.fi,ml:preset.ml,abv:preset.abv,qty:parseInt(parts[1])||1});
      }
    });
    renderDrinks();
  }
  calc();
