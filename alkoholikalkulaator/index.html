<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--card:#111;--label:#fff;--label2:#b0b0b0;--label3:#777;
  --sep:rgba(255,255,255,.08);--tint:#fff;--radius:14px;
  --card-border:1px solid rgba(255,255,255,.08);
  --font:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
:root[data-theme="light"]{
  --bg:#fff;--card:#f5f5f5;--label:#000;--label2:#444;--label3:#666;
  --sep:rgba(0,0,0,.08);--tint:#000;--card-border:1px solid rgba(0,0,0,.06);
}
@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#fff;--card:#f5f5f5;--label:#000;--label2:#444;--label3:#666;
    --sep:rgba(0,0,0,.08);--tint:#000;--card-border:1px solid rgba(0,0,0,.06);
  }
}
body{background:var(--bg);font-family:var(--font);color:var(--label);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.page{max-width:600px;margin:0 auto;padding:20px 16px 60px;overflow:visible}

/* ── Header ── */
.header{margin-bottom:24px}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-title-group{display:flex;align-items:center;gap:12px}
.header-icon{font-size:2rem;line-height:1}
.header-title{font-size:1.75rem;font-weight:700;letter-spacing:-.5px}
.header-sub{font-size:.85rem;color:var(--label2);margin-top:2px}

/* ── Lang switcher ── */
.header-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lang-switcher{display:flex;background:var(--sep);border-radius:8px;padding:2px;gap:2px}
.lang-btn{background:none;border:none;padding:4px 8px;border-radius:6px;font-size:.78rem;font-weight:600;color:var(--label2);cursor:pointer;font-family:var(--font);transition:.15s}
.lang-btn.active{background:var(--card);color:var(--tint);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.theme-btn{background:var(--sep);border:none;width:32px;height:32px;border-radius:8px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;-webkit-tap-highlight-color:transparent}
.theme-btn:hover{opacity:.8}

/* ── Form card ── */
.form-card{background:var(--card);border:var(--card-border);border-radius:var(--radius);padding:20px;margin-bottom:24px;display:flex;flex-direction:column;gap:20px}

/* ── Segmented control ── */
.seg-group{display:flex;flex-direction:column;gap:8px}
.seg-label{font-size:.78rem;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.5px}
.seg-ctrl{display:flex;background:var(--bg);border-radius:10px;padding:2px;gap:2px}
.seg-btn{flex:1;background:none;border:none;padding:9px 12px;border-radius:8px;font-size:.95rem;font-weight:500;color:var(--label2);cursor:pointer;font-family:var(--font);transition:.18s}
.seg-btn.active{background:var(--label);color:var(--bg);font-weight:600}

/* ── Input row ── */
.grow{display:flex;flex-direction:column;gap:6px}
.grow>label{font-size:.93rem;color:var(--label2);display:flex;align-items:center;gap:7px;font-weight:500}
.input-wrap{display:flex;align-items:center;background:var(--bg);border-radius:10px;overflow:hidden;border:1px solid transparent;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--label3)}
.input-wrap input{flex:1;border:none;background:none;padding:10px 12px;font-size:1rem;font-family:var(--font);color:var(--label);outline:none;min-width:0}
.input-wrap input::placeholder{color:var(--label3)}
.unit{padding:10px 12px 10px 0;font-size:.85rem;color:var(--label3);white-space:nowrap}

/* ── Req dot ── */
.req-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;background:var(--label3);transition:background .2s;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:transparent;line-height:1}
.req-dot::after{content:'✓'}
.req-dot.ok{background:#34c759;color:#fff}

/* ── Drinks section ── */
.drinks-section{display:flex;flex-direction:column;gap:10px}
.drinks-header{display:flex;align-items:center;gap:7px;font-size:.93rem;color:var(--label2);font-weight:500}
.drink-presets{display:flex;flex-wrap:wrap;gap:7px}
.preset-btn{display:flex;align-items:center;gap:5px;background:var(--bg);border:none;border-radius:20px;padding:7px 13px;font-size:.85rem;font-weight:500;color:var(--label);cursor:pointer;font-family:var(--font);transition:.15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.preset-btn:active{transform:scale(.95);opacity:.8}
.drinks-list{display:flex;flex-direction:column;gap:6px}
.drink-card{display:flex;align-items:center;gap:7px;background:var(--bg);border-radius:10px;padding:8px 10px}
.drink-icon{font-size:1.1rem;flex-shrink:0}
.drink-name{flex:1;font-size:.83rem;font-weight:500;color:var(--label);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drink-inp{width:52px;border:none;background:var(--card);border-radius:6px;padding:4px 6px;font-size:.83rem;font-family:var(--font);color:var(--label);text-align:center;outline:none}
.drink-unit{font-size:.75rem;color:var(--label3);white-space:nowrap}
.drink-grams{font-size:.75rem;color:var(--label2);white-space:nowrap;min-width:36px;text-align:right}
.drink-rm{background:none;border:none;color:var(--label3);cursor:pointer;font-size:1.1rem;padding:2px 4px;line-height:1;transition:color .15s;-webkit-tap-highlight-color:transparent}
.drink-rm:hover{color:#ff3b30}

/* ── Bento ── */
.bento{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:24px}

.c-ann{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);
  border-radius:var(--radius);padding:24px;min-height:160px;
  display:flex;flex-direction:column;justify-content:flex-end;
  transition:background .35s;position:relative;overflow:hidden;
}
.c-ann::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:20px 20px;-webkit-mask-image:radial-gradient(ellipse at 70% 30%,#000 10%,transparent 60%);mask-image:radial-gradient(ellipse at 70% 30%,#000 10%,transparent 60%);pointer-events:none}
.c-ann.st-warn{background:linear-gradient(135deg,#1a1200 0%,#2e1f00 40%,#3d2800 100%)}
.c-ann.st-danger{background:linear-gradient(135deg,#1a0000 0%,#2e0a0a 40%,#3d0f0f 100%)}
.ann-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9);padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.chip-green{background:rgba(52,199,89,.25);color:#4ade80}
.chip-orange{background:rgba(255,149,0,.28);color:#fbbf24}
.chip-red{background:rgba(255,59,48,.28);color:#f87171}
.ann-num{font-size:3.2rem;font-weight:700;color:#fff;letter-spacing:-1.5px;line-height:1}
.ann-num.e{color:rgba(255,255,255,.12)}
.ann-lbl{font-size:.85rem;color:rgba(255,255,255,.6);margin-top:4px}

/* ── Timeline ── */
.c-tml{background:var(--card);border:var(--card-border);border-radius:var(--radius);padding:20px}
.tml-sub{font-size:.75rem;font-weight:600;color:var(--label3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.tml-table{width:100%;border-collapse:collapse}
.tml-table th{font-size:.73rem;font-weight:600;color:var(--label3);text-align:left;padding:0 0 8px;text-transform:uppercase;letter-spacing:.4px}
.tml-table th:last-child{text-align:right}
.tml-table td{font-size:.9rem;padding:6px 0;border-top:.5px solid var(--sep)}
.tml-table td:last-child{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
.tml-now td{color:var(--tint)}
.bar-wrap{display:flex;align-items:center}
.bar{height:4px;border-radius:2px;min-width:2px}
.bar.safe{background:#34c759}
.bar.warn{background:#ff9500}
.bar.danger{background:#ff3b30}

/* ── Section cards ── */
.section-card{background:var(--card);border:var(--card-border);border-radius:var(--radius);padding:20px;margin-bottom:24px}
.section-full{background-color:var(--card);border:none;border-radius:0;width:100vw;margin-left:calc(-50vw + 50%);padding:40px calc(50vw - 50% + 16px);margin-bottom:24px;position:relative;overflow:hidden}
.section-full::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:40px 40px;-webkit-mask-image:radial-gradient(ellipse at 50% 50%,#000 20%,transparent 70%);mask-image:radial-gradient(ellipse at 50% 50%,#000 20%,transparent 70%);pointer-events:none}
.section-full>.section-title,.section-full>.how-steps,.section-full>.sources-list{max-width:568px;margin-left:auto;margin-right:auto;position:relative}
:root[data-theme="light"] .section-full::before{background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px)}
@media(prefers-color-scheme:light){:root:not([data-theme="dark"]) .section-full::before{background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px)}}
.section-title{font-size:1.35rem;font-weight:700;letter-spacing:-.3px;margin-bottom:16px}

/* ── How steps ── */
.how-steps{list-style:none;display:flex;flex-direction:column;gap:12px}
.how-steps li{display:flex;align-items:flex-start;gap:14px;font-size:.93rem;line-height:1.55;color:var(--label2)}
.step-badge{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--label);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;margin-top:1px}

/* ── Calc content ── */
.calc-content h3{font-size:1.05rem;font-weight:700;margin:14px 0 6px}
.calc-content h3:first-child{margin-top:0}
.calc-content p{font-size:.9rem;line-height:1.65;color:var(--label2);margin-bottom:8px}
.calc-content ul{padding-left:18px;margin-bottom:8px}
.calc-content li{font-size:.9rem;line-height:1.65;color:var(--label2);margin-bottom:2px}
.calc-content code{background:var(--bg);border-radius:4px;padding:1px 5px;font-size:.85rem;font-family:'SF Mono',monospace}
.calc-content strong{color:var(--label)}

/* ── FAQ ── */
.faq-item{border-top:.5px solid var(--sep)}
.faq-item:first-child{border-top:none}
.faq-q{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;background:transparent;border:none;cursor:pointer;font-family:var(--font);font-size:.93rem;font-weight:600;color:var(--label);text-align:left;-webkit-tap-highlight-color:transparent}
.faq-q:hover{opacity:.8}
.faq-toggle{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--sep);color:var(--label2);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;line-height:1;padding-bottom:1px;transition:transform .2s,background .2s}
.faq-item.open .faq-toggle{background:var(--label);color:var(--bg);transform:rotate(45deg)}
.faq-a{display:none;padding:0 0 14px;font-size:.88rem;line-height:1.65;color:var(--label2)}
.faq-a p{margin-bottom:6px}
.faq-item.open .faq-a{display:block}

/* ── Sources ── */
.sources-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.sources-list a{color:var(--label2);text-decoration:underline;text-underline-offset:2px;font-size:.88rem}
.sources-list a:hover{color:var(--label)}

/* ── Info grid ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
@media(max-width:480px){.info-grid{grid-template-columns:1fr}}
.info-card{border-radius:var(--radius);padding:20px}
.info-card--amber{background:linear-gradient(135deg,#3d2e00 0%,#4a3800 50%,#2a1f00 100%);border:1px solid rgba(251,191,36,.2)}
.info-card--blue{background:linear-gradient(135deg,#0f1f3d 0%,#162d52 50%,#0f1f3d 100%);border:1px solid rgba(100,160,255,.15)}
:root[data-theme="light"] .info-card--amber{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);border:none}
:root[data-theme="light"] .info-card--blue{background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);border:none}
:root[data-theme="light"] .info-card-title{color:#000}
:root[data-theme="light"] .info-card p{color:#374151}
@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]) .info-card--amber{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);border:none}
  :root:not([data-theme="dark"]) .info-card--blue{background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);border:none}
  :root:not([data-theme="dark"]) .info-card-title{color:#000}
  :root:not([data-theme="dark"]) .info-card p{color:#374151}
}
.info-icon{font-size:1.5rem;margin-bottom:8px}
.info-card-title{font-size:1.05rem;font-weight:700;color:var(--label);margin-bottom:6px}
.info-card p{font-size:.82rem;line-height:1.55;color:var(--label2)}
.contact-btn{display:inline-block;margin-top:10px;background:#fff;color:#000;border-radius:8px;padding:7px 14px;font-size:.82rem;font-weight:600;text-decoration:none}
</style>
</head>

<div class="page">

  <header class="header">
    <div class="header-inner">
      <div class="header-title-group">

  <!-- FAQ -->

  <!-- Sources -->

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let lang   = 'et';
let gender = 'm';
let drinks = [];
let uid    = 0;

// ── Drink presets ──────────────────────────────────────────────────────────────
const PRESETS = [
  {id:'beer330',  icon:'🍺', ml:330, abv:5.0,  name:{et:'Õlu 330ml',    en:'Beer 330ml',    ru:'Пиво 330мл',    fi:'Olut 330ml'   }},
  {id:'beer500',  icon:'🍺', ml:500, abv:5.0,  name:{et:'Õlu 500ml',    en:'Beer 500ml',    ru:'Пиво 500мл',    fi:'Olut 500ml'   }},
  {id:'wine',     icon:'🍷', ml:150, abv:12.0, name:{et:'Vein 150ml',   en:'Wine 150ml',    ru:'Вино 150мл',    fi:'Viini 150ml'  }},
  {id:'spirits',  icon:'🥃', ml:40,  abv:40.0, name:{et:'Viin 40ml',    en:'Spirit 40ml',   ru:'Водка 40мл',    fi:'Viina 40ml'   }},
  {id:'cider',    icon:'🍹', ml:330, abv:4.5,  name:{et:'Siider 330ml', en:'Cider 330ml',   ru:'Сидр 330мл',    fi:'Siideri 330ml'}},
  {id:'longdrink',icon:'🥤', ml:330, abv:5.5,  name:{et:'Long drink',   en:'Long drink',    ru:'Лонгдринк',     fi:'Long drink'   }},
];

// ── Translations ───────────────────────────────────────────────────────────────
const T = {
  et:{
    mainTitle:'Alkoholi­kalkulaator', mainSub:'Vere alkoholisisaldus promillides',
    genderLabel:'SUGU', male:'♂ Mees', female:'♀ Naine',
    weightLbl:'Kehakaal', drinksLbl:'Tarbitud joogid',
    hoursLbl:'Tunde tagasi alustasid', hoursUnit:'tundi',
    annLbl:'promilli',
    chipSober:'Kaine', chipWarn:'Alla piiri', chipDanger:'Ei tohi juhtida',
    chipDriveIn:'Rooli saab', chipSoberIn:'Kaine',
    tlSub:'BAC ajagraafik', tlTime:'Aeg', tlBAC:'Promillid',
    tlNow:'Praegu', tlSober:'Kaine',
    addCustom:'+ Kohandatud',
    howTitle:'Kuidas kasutada?',
    howSteps:[
      'Vali sugu — mõjutab Widmarti koefitsienti (mees 0,70 / naine 0,60).',
      'Sisesta kehakaal kilogrammides.',
      'Lisa tarbitud joogid eelseadistuste abil. Kogust ja %ABV saab kohapeal muuta.',
      'Sisesta mitu tundi tagasi alustasid joomist (0 = just nüüd).',
      'Promillid ja ajagraafik ilmuvad koheselt.',
    ],
    calcTitle:'Kuidas promillid arvutatakse?',
    calcHTML:`

// ── Drink list ─────────────────────────────────────────────────────────────────
function addPreset(pid){
  const p = PRESETS.find(x=>x.id===pid);
  if(!p) return;
  drinks.push({uid:++uid, icon:p.icon, name:p.name[lang]||p.name.et, ml:p.ml, abv:p.abv});
  renderDrinks(); calc();
}
function addCustom(){
  drinks.push({uid:++uid, icon:'🍶', name:'Custom', ml:100, abv:5.0});
  renderDrinks(); calc();
}
function removeDrink(id){
  drinks = drinks.filter(d=>d.uid!==id);
  renderDrinks(); calc();
}
function updateDrink(id, field, val){
  const d = drinks.find(x=>x.uid===id);
  if(d){ d[field]=parseFloat(val)||0; refreshGrams(d); }
  calc();
}
function grams(d){ return d.ml*(d.abv/100)*0.789; }
function refreshGrams(d){
  const el=document.getElementById('g-'+d.uid);
  if(el) el.textContent=grams(d).toFixed(1)+'g';
}

function renderDrinks(){
  const list = document.getElementById('drinksList');
  list.innerHTML = drinks.map(d=>`

      <span class="drink-icon">${d.icon}</span>
      <span class="drink-name">${d.name}</span>
      <input class="drink-inp" type="number" value="${d.ml}" min="1" max="2000" step="10"
        onchange="updateDrink(${d.uid},'ml',this.value)" title="ml">
      <span class="drink-unit">ml</span>
      <input class="drink-inp" type="number" value="${d.abv}" min="0.5" max="96" step="0.5"
        onchange="updateDrink(${d.uid},'abv',this.value)" title="%">
      <span class="drink-unit">%</span>
      <span class="drink-grams" id="g-${d.uid}">${grams(d).toFixed(1)}g</span>
      <button class="drink-rm" onclick="removeDrink(${d.uid})">×</button>
    </div>`).join('');
}

// ── BAC ────────────────────────────────────────────────────────────────────────
function calcBAC(w, g, ds, h){
  const r=g==='m'?0.70:0.60, beta=0.15;
  const totalG = ds.reduce((s,d)=>s+grams(d),0);
  if(totalG<=0||w<=0) return {bac:0,totalG:0};
  const raw = totalG/(w*r);
  return {bac:Math.max(0,raw-beta*h), raw, totalG, r};
}

function fmtTime(h){
  if(h<=0) return '0 min';
  const hrs=Math.floor(h), mins=Math.round((h-hrs)*60);
  if(hrs===0) return mins+'min';
  if(mins===0) return hrs+'h';
  return hrs+'h '+mins+'min';
}
function fmtBac(v){ return v.toFixed(2).replace('.',','); }

// ── Dots ───────────────────────────────────────────────────────────────────────
function updateDots(){
  const w=parseFloat(document.getElementById('iWeight').value)||0;
  const h=document.getElementById('iHours').value;
  const set=(id,ok)=>{const el=document.getElementById(id);if(el)el.classList.toggle('ok',ok);};
  set('dotWeight', w>=30&&w<=250);
  set('dotDrinks', drinks.length>0);
  set('dotHours',  h!==''&&parseFloat(h)>=0);
}

// ── Clear ──────────────────────────────────────────────────────────────────────
function clearResult(){
  const el=document.getElementById('annNum');
  el.textContent='—'; el.classList.add('e');
  document.getElementById('annChips').innerHTML='';
  document.getElementById('annCell').className='c-ann';
  document.getElementById('tmlCard').style.display='none';
  updateDots();
}

// ── Calc ───────────────────────────────────────────────────────────────────────
function calc(){
  const tr = t();
  const w  = parseFloat(document.getElementById('iWeight').value)||0;
  const h  = parseFloat(document.getElementById('iHours').value)||0;
  updateDots();
  if(w<30||drinks.length===0){ clearResult(); return; }

  const {bac, totalG} = calcBAC(w, gender, drinks, h);
  const beta = 0.15;

  // Ann number
  const numEl = document.getElementById('annNum');
  numEl.textContent = fmtBac(bac);
  numEl.classList.remove('e');

  // Ann cell color
  const cell = document.getElementById('annCell');
  cell.className = 'c-ann' + (bac>=0.20?' st-danger': bac>0?' st-warn':'');

  // Chips
  const chips=[];
  if(bac<=0){
    chips.push(`<span class="chip chip-green">✓ ${tr.chipSober}</span>`);
  } else if(bac<0.20){
    chips.push(`<span class="chip chip-orange">⚠ ${tr.chipWarn}</span>`);
  } else {
    chips.push(`<span class="chip chip-red">🚫 ${tr.chipDanger}</span>`);
    chips.push(`<span class="chip chip-orange">🚗 ${tr.chipDriveIn}: ${fmtTime((bac-0.19)/beta)}</span>`);
  }
  if(bac>0){
    chips.push(`<span class="chip">⏱ ${tr.chipSoberIn}: ${fmtTime(bac/beta)}</span>`);
  }
  chips.push(`<span class="chip">${totalG.toFixed(1)}g EtOH</span>`);
  document.getElementById('annChips').innerHTML = chips.join('');

  // Timeline
  renderTimeline(bac, beta, tr);
}

function renderTimeline(bac, beta, tr){
  const card = document.getElementById('tmlCard');
  card.style.display = 'block';
  document.getElementById('tlSub').textContent = tr.tlSub;

  const maxH = Math.min(Math.ceil(bac/beta)+1, 14);
  const rows = [{label:tr.tlNow, bac, now:true}];
  for(let i=1;i<=maxH;i++){
    const fb = Math.max(0,bac-beta*i);
    rows.push({label:'+'+i+'h', bac:fb});
    if(fb===0) break;
  }

  document.getElementById('tlContainer').innerHTML = `
    <table class="tml-table">
      <thead><tr><th>${tr.tlTime}</th><th></th><th>${tr.tlBAC}</th></tr></thead>
      <tbody>${rows.map(r=>{
        const lvl = r.bac>=0.20?'danger':r.bac>0?'warn':'safe';
        const w   = bac>0?Math.round((r.bac/bac)*100):0;
        const val = r.bac===0?`<span style="color:#34c759">${tr.tlSober}</span>`:fmtBac(r.bac)+' ‰';
        return `<tr class="${r.now?'tml-now':''}">
          <td>${r.label}</td>
          <td><div class="bar-wrap"><div class="bar ${lvl}" style="width:${w}px"></div></div></td>
          <td>${val}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

function toggleFaq(i){
  const item=document.getElementById('faq-'+i);
  item.classList.toggle('open');
  item.querySelector('.faq-q').setAttribute('aria-expanded',item.classList.contains('open'));
}

// ── Theme ──────────────────────────────────────────────────────────────────────
function isDark(){
  const saved = localStorage.getItem('theme');
  if(saved) return saved==='dark';
  return window.matchMedia('(prefers-color-scheme:dark)').matches;
}
function applyTheme(dark){
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  document.getElementById('themeBtn').textContent = dark?'☀️':'🌙';
}
function toggleTheme(){
  const nowDark = document.documentElement.getAttribute('data-theme')==='dark';
  localStorage.setItem('theme', nowDark?'light':'dark');
  applyTheme(!nowDark);
}

// ── Init ───────────────────────────────────────────────────────────────────────
(function(){
  applyTheme(isDark());
  setLang('et');
})();
